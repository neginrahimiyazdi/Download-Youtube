name: Download YouTube Video to Repo

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      video_url:
        description: "YouTube video URL"
        required: true
        type: string
      filename:
        description: "Output filename (e.g., video.mp4)"
        required: true
        type: string
      quality:
        description: "Format selection (best, worst, bestvideo+bestaudio, mp4)"
        required: false
        default: "best"
        type: string

jobs:
  download:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup yt-dlp
        uses: AnimMouse/setup-yt-dlp@v3

      - name: Download YouTube video
        run: |
          yt-dlp -f "${{ inputs.quality }}" \
                 -o "${{ inputs.filename }}" \
                 --no-playlist \
                 "${{ inputs.video_url }}"

      - name: Verify downloaded file
        run: file "${{ inputs.filename }}" || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.filename }}"
          git commit -m "Download YouTube video: ${{ inputs.video_url }}" || echo "No changes"
          git push
